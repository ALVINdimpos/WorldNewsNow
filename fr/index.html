<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Base SEO — overridden per-page by react-helmet-async -->
    <title>WorldNewsNow — Independent Global Journalism</title>
    <meta name="description" content="WorldNewsNow delivers independent global journalism — breaking news, politics, technology, business, science, sports and entertainment from around the world." />
    <meta name="keywords" content="world news, breaking news, politics, technology, business, sports, science, entertainment, journalism" />
    <meta name="author" content="WorldNewsNow" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#D4A853" />

    <!-- Canonical -->
    <link rel="canonical" href="https://worldnewsnow.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="WorldNewsNow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WorldNewsNow — Independent Global Journalism" />
    <meta property="og:description" content="Independent global journalism. Covering the stories that matter, without fear or favour." />
    <meta property="og:url" content="https://worldnewsnow.vercel.app/" />
    <meta property="og:image" content="https://worldnewsnow.vercel.app/og-default.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@WorldNewsNow" />
    <meta name="twitter:title" content="WorldNewsNow — Independent Global Journalism" />
    <meta name="twitter:description" content="Independent global journalism. Covering the stories that matter, without fear or favour." />
    <meta name="twitter:image" content="https://worldnewsnow.vercel.app/og-default.jpg" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/worldnewsnow_icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Sitemap reference -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
